<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 7 - CSS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="block">
            <h1>Лабораторная работа 7</h1>
            <p>Пример простой страницы с оформлением на CSS.</p>
        </header>

        <section class="block">
            <h2>Информация о товаре</h2>
            <div class="product-card">
                <h3>Письменный набор</h3>
                <p>Набор для учебы и работы.</p>
                <p>Старая цена: <span class="old-price">1000 ₽</span></p>
                <p>Новая цена: <span class="new-price">500 ₽</span></p>
            </div>
        </section>

        <section class="block">
            <h2>Список преимуществ</h2>
            <ul class="feature-list">
                <li>Простая структура страницы</li>
                <li>Оформление текста и блока товара</li>
                <li>Кнопка с hover-эффектом</li>
            </ul>
        </section>

        <section class="block">
            <h2>Форма</h2>
            <form class="form">
                <label for="email">Email:</label>
                <input id="email" type="email" placeholder="name@example.com">
                <button type="button">Отправить</button>
            </form>
        </section>
    </div>
</body>
</html>
