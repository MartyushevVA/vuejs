<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Lab 3 - JS</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 
                         "Segoe UI", Roboto, Arial, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 30px;
            background-color: white;
            border: 1px solid #ddd;
        }

        button {
            padding: 10px 22px;
            font-size: 15px;
            border: 1px solid #222;
            background-color: white;
            color: #222;
            cursor: pointer;
            transition: 0.15s ease;
        }

        button:hover {
            background-color: #222;
            color: white;
        }

        button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <button onclick="task1()">1. Сортировка</button>
        <button onclick="task2()">2. Остатки от деления на 5</button>
        <button onclick="task3()">3. Медиана</button>
        <button onclick="task4()">4. Проверка скобок</button>
        <button onclick="task5()">5. Глубокая копия объекта</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
